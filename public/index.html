<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitchDeck - Leaderboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease-out forwards;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans antialiased selection:bg-indigo-100 selection:text-indigo-900">
  <div class="max-w-6xl mx-auto p-8">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-10 animate-fade-in-up">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-indigo-600 to-blue-500 flex items-center justify-center font-bold text-white shadow-lg shadow-indigo-500/30 text-2xl transform hover:rotate-6 transition-transform">P</div>
        <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">PitchDeck <span class="text-3xl font-light text-indigo-600">Leaderboard</span></h1>
      </div>
      <a href="/login.html" class="bg-white hover:bg-slate-50 text-indigo-600 font-bold py-2.5 px-6 rounded-lg transition-all shadow-md hover:shadow-lg border border-slate-200 transform hover:-translate-y-0.5">Login / Dashboard</a>
    </div>

    <!-- Dropdown Selector -->
    <div class="bg-white border border-slate-200 rounded-2xl p-8 mb-8 shadow-sm hover:shadow-md transition-shadow animate-fade-in-up" style="animation-delay: 0.1s;">
      <label for="hackathon-select" class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider">Select Event to View</label>
      <div class="relative">
        <select id="hackathon-select" class="w-full bg-slate-50 text-slate-900 rounded-xl px-5 py-4 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 appearance-none cursor-pointer transition-all text-lg font-medium">
          <option value="">Loading events...</option>
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </div>
      </div>
    </div>

    <!-- Leaderboard Table -->
    <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden animate-fade-in-up" style="animation-delay: 0.2s;">
      <div class="overflow-x-auto">
        <table class="min-w-full text-left border-collapse">
          <thead class="bg-slate-50 border-b border-slate-200">
            <tr>
              <th class="px-8 py-5 text-xs font-bold text-slate-500 uppercase tracking-widest">Rank</th>
              <th class="px-8 py-5 text-xs font-bold text-slate-500 uppercase tracking-widest">Team</th>
              <th class="px-8 py-5 text-xs font-bold text-slate-500 uppercase tracking-widest">Project</th>
              <th class="px-8 py-5 text-xs font-bold text-slate-500 uppercase tracking-widest text-center">Score</th>
              <th class="px-8 py-5 text-xs font-bold text-slate-500 uppercase tracking-widest text-center">Grade</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body" class="divide-y divide-slate-100">
            <!-- Rows injected by JS -->
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    async function loadHackathons() {
      try {
        const res = await fetch('/api/hackathons');
        const hackathons = await res.json();
        const select = document.getElementById('hackathon-select');
        select.innerHTML = hackathons.map(h => 
          `<option value="${h.hackathon_id}">${h.title} (${h.status.toUpperCase()})</option>`
        ).join('');
        if(hackathons.length > 0) fetchLeaderboard();
      } catch (err) {
        console.error('Failed to load hackathons', err);
        document.getElementById('hackathon-select').innerHTML = '<option value="">Error loading events</option>';
      }
    }

    async function fetchLeaderboard() {
      const hackathonId = document.getElementById('hackathon-select').value;
      if(!hackathonId) return;
      try {
        const res = await fetch(`/api/leaderboard?hackathon_id=${hackathonId}`);
        const data = await res.json();
        
        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = '';
        
        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="px-8 py-16 text-center text-slate-400 font-medium text-lg">No submissions have been graded yet.</td></tr>';
          return;
        }

        data.forEach((row, index) => {
          const tr = document.createElement('tr');
          // Add staggered animation to rows
          tr.className = `hover:bg-indigo-50/50 transition duration-300 animate-fade-in-up opacity-0`;
          tr.style.animationDelay = `${0.1 + (index * 0.05)}s`;
          
          let rankBadge = 'bg-slate-100 text-slate-600';
          if (row.rank === 1) rankBadge = 'bg-gradient-to-r from-yellow-400 to-amber-500 text-white shadow-lg shadow-yellow-500/30';
          if (row.rank === 2) rankBadge = 'bg-gradient-to-r from-slate-300 to-slate-400 text-white shadow-lg shadow-slate-400/30';
          if (row.rank === 3) rankBadge = 'bg-gradient-to-r from-orange-400 to-rose-400 text-white shadow-lg shadow-orange-500/30';

          let gradeBadge = 'bg-slate-100 text-slate-500';
          if (row.grade === 'A+' || row.grade === 'A') gradeBadge = 'bg-emerald-100 text-emerald-700 border border-emerald-200';
          if (row.grade === 'B+' || row.grade === 'B') gradeBadge = 'bg-blue-100 text-blue-700 border border-blue-200';
          if (row.grade === 'C+' || row.grade === 'C') gradeBadge = 'bg-yellow-100 text-yellow-700 border border-yellow-200';
          if (row.grade === 'F') gradeBadge = 'bg-rose-100 text-rose-700 border border-rose-200';

          tr.innerHTML = `
            <td class="px-8 py-6 whitespace-nowrap">
              <span class="inline-flex items-center justify-center w-10 h-10 rounded-full font-bold text-lg ${rankBadge}">
                #${row.rank || '-'}
              </span>
            </td>
            <td class="px-8 py-6 font-extrabold text-xl text-slate-800">${row.team_name}</td>
            <td class="px-8 py-6">
              <div class="text-indigo-600 font-bold text-lg mb-1">${row.project_title || 'No Submission'}</div>
              <div class="flex gap-4">
                ${row.github_url ? `<a href="${row.github_url}" target="_blank" class="text-xs font-bold text-slate-400 hover:text-indigo-600 transition-colors uppercase tracking-wide flex items-center gap-1"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"/></svg> Code</a>` : ''}
                ${row.demo_url ? `<a href="${row.demo_url}" target="_blank" class="text-xs font-bold text-slate-400 hover:text-indigo-600 transition-colors uppercase tracking-wide flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg> Live</a>` : ''}
              </div>
            </td>
            <td class="px-8 py-6 text-center">
              <div class="text-2xl font-black ${row.weighted_total > 0 ? 'text-slate-800' : 'text-slate-400'}">${Number(row.weighted_total).toFixed(2)}</div>
              <div class="text-xs text-slate-400 mt-1 uppercase font-semibold">${Number(row.total_raw).toFixed(2)} raw</div>
            </td>
            <td class="px-8 py-6 text-center">
              <span class="px-4 py-2 inline-flex text-sm font-extrabold rounded-full ${gradeBadge}">
                ${row.grade || 'N/A'}
              </span>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error('Failed to load leaderboard', err);
      }
    }

    document.getElementById('hackathon-select').addEventListener('change', fetchLeaderboard);
    
    // Initialize
    loadHackathons();
    setInterval(fetchLeaderboard, 30000);
  </script>
</body>
</html>
