<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitchDeck - Leaderboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-white min-h-screen font-sans antialiased">
  <div class="max-w-6xl mx-auto p-8">
    <div class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-tr from-blue-500 to-purple-600 flex items-center justify-center font-bold shadow-lg shadow-blue-500/30 text-xl">P</div>
        <h1 class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">PitchDeck <span class="text-2xl font-light text-blue-400">Leaderboard</span></h1>
      </div>
      <a href="/login.html" class="bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-semibold py-2.5 px-6 rounded-lg transition-all shadow-lg hover:shadow-blue-500/50 transform hover:-translate-y-0.5">Login / Dashboard</a>
    </div>

    <div class="bg-gray-800/60 backdrop-blur-md border border-gray-700/50 rounded-xl p-6 mb-8 shadow-2xl">
      <label for="hackathon-select" class="block text-sm font-semibold mb-2 text-gray-300 uppercase tracking-wider">Select Event to View</label>
      <select id="hackathon-select" class="w-full bg-gray-900 text-white rounded-lg px-4 py-3 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none cursor-pointer transition">
        <option value="">Loading events...</option>
      </select>
    </div>

    <div class="bg-gray-800/80 backdrop-blur-md border border-gray-700/50 rounded-xl shadow-2xl overflow-hidden">
      <table class="min-w-full text-left border-collapse">
        <thead class="bg-gray-900/80">
          <tr>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Rank</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Team</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Project</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider text-center">Score</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider text-center">Grade</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body" class="divide-y divide-gray-700/50">
          <!-- Rows injected by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    async function loadHackathons() {
      try {
        const res = await fetch('/api/hackathons');
        const hackathons = await res.json();
        const select = document.getElementById('hackathon-select');
        select.innerHTML = hackathons.map(h => 
          `<option value="${h.hackathon_id}">${h.title} (${h.status.toUpperCase()})</option>`
        ).join('');
        if(hackathons.length > 0) fetchLeaderboard();
      } catch (err) {
        console.error('Failed to load hackathons', err);
        document.getElementById('hackathon-select').innerHTML = '<option value="">Error loading events</option>';
      }
    }

    async function fetchLeaderboard() {
      const hackathonId = document.getElementById('hackathon-select').value;
      if(!hackathonId) return;
      try {
        const res = await fetch(`/api/leaderboard?hackathon_id=${hackathonId}`);
        const data = await res.json();
        
        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = '';
        
        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-12 text-center text-gray-400 italic">No submissions have been graded yet.</td></tr>';
          return;
        }

        data.forEach(row => {
          const tr = document.createElement('tr');
          tr.className = "hover:bg-gray-700/30 transition duration-150";
          
          let rankBadge = 'bg-gray-800 text-gray-400';
          if (row.rank === 1) rankBadge = 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/30';
          if (row.rank === 2) rankBadge = 'bg-gray-400/20 text-gray-300 border border-gray-400/30';
          if (row.rank === 3) rankBadge = 'bg-amber-700/20 text-amber-500 border border-amber-700/30';

          let gradeBadge = 'bg-gray-700 text-gray-400';
          if (row.grade === 'A+' || row.grade === 'A') gradeBadge = 'bg-green-500/20 text-green-400 border border-green-500/30';
          if (row.grade === 'B+' || row.grade === 'B') gradeBadge = 'bg-blue-500/20 text-blue-400 border border-blue-500/30';
          if (row.grade === 'C+' || row.grade === 'C') gradeBadge = 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/30';
          if (row.grade === 'F') gradeBadge = 'bg-red-500/20 text-red-400 border border-red-500/30';

          tr.innerHTML = `
            <td class="px-6 py-4 whitespace-nowrap">
              <span class="inline-flex items-center justify-center w-8 h-8 rounded-full font-bold ${rankBadge}">
                #${row.rank || '-'}
              </span>
            </td>
            <td class="px-6 py-4 font-semibold text-lg">${row.team_name}</td>
            <td class="px-6 py-4">
              <div class="text-blue-300 font-medium text-lg">${row.project_title || 'No Submission'}</div>
              <div class="flex gap-4 mt-2">
                ${row.github_url ? `<a href="${row.github_url}" target="_blank" class="text-xs font-bold text-gray-400 hover:text-white transition">GITHUB</a>` : ''}
                ${row.demo_url ? `<a href="${row.demo_url}" target="_blank" class="text-xs font-bold text-gray-400 hover:text-white transition">LIVE DEMO</a>` : ''}
              </div>
            </td>
            <td class="px-6 py-4 text-center">
              <div class="text-xl font-bold ${row.weighted_total > 0 ? 'text-white' : 'text-gray-600'}">${Number(row.weighted_total).toFixed(2)}</div>
              <div class="text-xs text-gray-500 mt-1">${Number(row.total_raw).toFixed(2)} raw</div>
            </td>
            <td class="px-6 py-4 text-center">
              <span class="px-3 py-1 inline-flex text-sm font-extrabold rounded-md ${gradeBadge}">
                ${row.grade || 'N/A'}
              </span>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error('Failed to load leaderboard', err);
      }
    }

    document.getElementById('hackathon-select').addEventListener('change', fetchLeaderboard);
    
    // Initialize
    loadHackathons();
    setInterval(fetchLeaderboard, 30000);
  </script>
</body>
</html>
