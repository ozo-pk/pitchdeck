<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PitchDeck - Judge Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-gray-100 font-sans min-h-screen">
  
  <header class="bg-gray-900/80 backdrop-blur-md border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-tr from-yellow-500 to-amber-600 flex items-center justify-center font-bold shadow-lg shadow-yellow-500/30 text-xl">J</div>
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">Judge <span class="text-yellow-400">Panel</span></h1>
      </div>
      <button onclick="logout()" class="bg-gray-700 hover:bg-gray-600 text-white font-medium py-2 px-5 rounded-lg transition-all border border-gray-600">Logout</button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-6 mt-8 space-y-10">
    
    <!-- Judge Assignments -->
    <div class="bg-gray-800/60 backdrop-blur-md border border-gray-700/50 rounded-xl p-8 shadow-2xl relative overflow-hidden">
      <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-extrabold text-white tracking-tight">Your Assignments</h2>
        <button onclick="loadAssignments()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-all shadow-lg hover:shadow-blue-500/50">Refresh</button>
      </div>
      <div class="overflow-x-auto rounded-lg border border-gray-700">
        <table class="min-w-full divide-y divide-gray-700">
          <thead class="bg-gray-900/80">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-bold text-gray-400 uppercase tracking-wider">Assignment ID</th>
              <th class="px-6 py-3 text-left text-xs font-bold text-gray-400 uppercase tracking-wider">Hackathon Event</th>
              <th class="px-6 py-3 text-left text-xs font-bold text-gray-400 uppercase tracking-wider">Action</th>
            </tr>
          </thead>
          <tbody id="assignments-body" class="bg-gray-800 divide-y divide-gray-700"></tbody>
        </table>
      </div>
    </div>

    <!-- Dynamic Scoring Form -->
    <div id="scoring-section" class="bg-gray-800/60 backdrop-blur-md border border-gray-700/50 rounded-xl p-8 shadow-2xl relative overflow-hidden hidden transition-all duration-300">
      <div class="absolute top-0 left-0 w-1 h-full bg-yellow-500"></div>
      <h2 class="text-2xl font-extrabold mb-6 text-white tracking-tight">Submit Scores</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div>
          <label class="block text-sm font-semibold mb-2 text-gray-300 uppercase tracking-wider">Assignment ID</label>
          <input type="number" id="score-assignment-id" readonly class="w-full bg-gray-900/50 border border-gray-600 rounded-lg px-4 py-3 text-gray-500 cursor-not-allowed">
        </div>
        <div>
          <label class="block text-sm font-semibold mb-2 text-gray-300 uppercase tracking-wider">Select Submission</label>
          <select id="score-sub-id" onchange="showProjectDetails(this)" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-yellow-500 appearance-none cursor-pointer">
            <option value="">Loading submissions...</option>
          </select>
        </div>
      </div>

      <!-- Project Details Card (Hidden by default) -->
      <div id="project-details-card" class="bg-gray-900/50 p-6 rounded-xl border border-gray-700 shadow-inner hidden mb-8">
        <h3 class="text-xl font-extrabold text-white mb-4">Project Details</h3>
        <p class="text-gray-300 mb-4" id="detail-desc"></p>
        <div class="flex gap-4">
          <a id="detail-github" href="#" target="_blank" class="hidden inline-flex items-center gap-2 bg-gray-800 hover:bg-gray-700 text-white font-semibold py-2 px-4 rounded-lg border border-gray-600 transition">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"/></svg>
            GitHub Repo
          </a>
          <a id="detail-demo" href="#" target="_blank" class="hidden inline-flex items-center gap-2 bg-yellow-600 hover:bg-yellow-700 text-white font-semibold py-2 px-4 rounded-lg shadow-lg transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
            Live Demo
          </a>
        </div>
      </div>
      
      <div id="criteria-container" class="space-y-6 my-8">
        <!-- Criteria dynamically injected here -->
      </div>
      
      <div class="pt-6 border-t border-gray-700 flex flex-col items-center">
        <button onclick="submitAllScores()" class="w-full md:w-auto px-12 bg-gradient-to-r from-green-600 to-emerald-700 hover:from-green-500 hover:to-emerald-600 text-white font-bold py-4 rounded-lg shadow-lg hover:shadow-green-500/50 transition-all transform hover:-translate-y-0.5 text-lg">Submit Final Evaluation</button>
        <div id="score-msg" class="mt-4 font-bold text-center"></div>
      </div>
    </div>
  </main>

  <script>
    let currentCriteria = [];

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/login.html';
    }

    async function loadAssignments() {
      const res = await fetch('/api/judge/assignments', { credentials: 'include' });
      if (!res.ok) {
        if(res.status === 401 || res.status === 403) window.location.href = '/login.html';
        return;
      }
      const data = await res.json();
      const tbody = document.getElementById('assignments-body');
      tbody.innerHTML = '';
      data.forEach(row => {
        tbody.innerHTML += `
          <tr class="hover:bg-gray-700/30 transition">
            <td class="px-6 py-4 font-mono font-bold text-blue-400">#${row.assignment_id}</td>
            <td class="px-6 py-4 font-semibold text-lg text-white">${row.title}</td>
            <td class="px-6 py-4">
              <button onclick="openScoring(${row.assignment_id}, ${row.hackathon_id})" class="bg-yellow-600 hover:bg-yellow-500 text-white font-bold px-4 py-2 rounded shadow-lg hover:shadow-yellow-500/30 transition">Start Evaluation</button>
            </td>
          </tr>
        `;
      });
    }

    async function openScoring(assignmentId, hackathonId) {
      document.getElementById('scoring-section').classList.remove('hidden');
      document.getElementById('score-assignment-id').value = assignmentId;
      document.getElementById('score-msg').textContent = '';
      const subSelect = document.getElementById('score-sub-id');
      subSelect.innerHTML = '<option value="">Loading submissions...</option>';

      try {
        // Fetch submissions
        const subRes = await fetch(`/api/judge/submissions/${hackathonId}`, { credentials: 'include' });
        const submissions = await subRes.json();
        
        if (submissions.length === 0) {
          subSelect.innerHTML = '<option value="">No submissions found for this event</option>';
        } else {
          subSelect.innerHTML = '<option value="">-- Select a Project to Evaluate --</option>' + 
            submissions.map(s => {
              // Escape quotes to safely put in dataset
              const desc = (s.description || '').replace(/"/g, '&quot;');
              return `<option value="${s.sub_id}" data-desc="${desc}" data-github="${s.github_url || ''}" data-demo="${s.demo_url || ''}">${s.team_name} - ${s.title}</option>`;
            }).join('');
        }
      } catch (err) {
        subSelect.innerHTML = '<option value="">Failed to load submissions</option>';
      }
      
      // Fetch criteria
      const res = await fetch(`/api/criteria/${hackathonId}`, { credentials: 'include' });
      currentCriteria = await res.json();
      
      const container = document.getElementById('criteria-container');
      container.innerHTML = '';
      
      currentCriteria.forEach(c => {
        container.innerHTML += `
          <div class="bg-gray-900/50 p-6 rounded-xl border border-gray-700 shadow-inner">
            <div class="flex justify-between items-center mb-4">
              <h3 class="text-xl font-extrabold text-blue-400 tracking-wide">${c.name}</h3>
              <span class="px-3 py-1 bg-gray-800 rounded-full text-xs font-bold text-gray-400 border border-gray-600">Max Score: <span class="text-white">${c.max_score}</span></span>
            </div>
            <div class="flex flex-col md:flex-row gap-6">
              <div class="md:w-1/4">
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Awarded Score</label>
                <input type="number" step="any" max="${c.max_score}" id="crit-score-${c.criterion_id}" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white text-lg font-bold focus:ring-2 focus:ring-blue-500" required>
              </div>
              <div class="md:w-3/4">
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Constructive Feedback</label>
                <input type="text" id="crit-comment-${c.criterion_id}" placeholder="Provide actionable feedback..." class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-gray-300 focus:ring-2 focus:ring-blue-500">
              </div>
            </div>
          </div>
        `;
      });
    }

    function showProjectDetails(selectElement) {
      const card = document.getElementById('project-details-card');
      const descEl = document.getElementById('detail-desc');
      const gitEl = document.getElementById('detail-github');
      const demoEl = document.getElementById('detail-demo');

      const selectedOption = selectElement.options[selectElement.selectedIndex];
      
      if (!selectedOption.value) {
        card.classList.add('hidden');
        return;
      }

      card.classList.remove('hidden');
      descEl.textContent = selectedOption.dataset.desc || 'No description provided.';
      
      if (selectedOption.dataset.github) {
        gitEl.href = selectedOption.dataset.github;
        gitEl.classList.remove('hidden');
      } else {
        gitEl.classList.add('hidden');
      }

      if (selectedOption.dataset.demo) {
        demoEl.href = selectedOption.dataset.demo;
        demoEl.classList.remove('hidden');
      } else {
        demoEl.classList.add('hidden');
      }
    }

    async function submitAllScores() {
      const assignmentId = document.getElementById('score-assignment-id').value;
      const subId = document.getElementById('score-sub-id').value;
      const msg = document.getElementById('score-msg');
      
      if (!subId) {
        msg.textContent = "Please enter a valid Submission ID to score.";
        msg.className = "mt-4 font-bold text-center text-red-400";
        return;
      }

      msg.textContent = "Submitting evaluations securely...";
      msg.className = "mt-4 font-bold text-center text-yellow-400";
      
      let allSuccess = true;
      let errorMsg = '';

      // First check if any score is empty
      for (let c of currentCriteria) {
        if (document.getElementById(`crit-score-${c.criterion_id}`).value === '') {
          msg.textContent = "Please provide a score for all criteria.";
          msg.className = "mt-4 font-bold text-center text-red-400";
          return;
        }
      }

      for (let c of currentCriteria) {
        const score = document.getElementById(`crit-score-${c.criterion_id}`).value;
        const comments = document.getElementById(`crit-comment-${c.criterion_id}`).value;
        
        try {
          const res = await fetch('/api/scores/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
              assignment_id: assignmentId,
              sub_id: subId,
              criterion_id: c.criterion_id,
              score: score,
              comments: comments
            })
          });
          const data = await res.json();
          if (data.status !== 'Success') {
            allSuccess = false;
            errorMsg = data.status || data.error;
            break;
          }
        } catch (e) {
          allSuccess = false;
          errorMsg = "Network error";
          break;
        }
      }

      if (allSuccess) {
        msg.textContent = "All scores successfully submitted and aggregated!";
        msg.className = "mt-4 font-bold text-center text-green-400";
        setTimeout(() => {
          document.getElementById('scoring-section').classList.add('hidden');
        }, 3000);
      } else {
        msg.textContent = `Error submitting scores: ${errorMsg}`;
        msg.className = "mt-4 font-bold text-center text-red-400";
      }
    }

    loadAssignments();
  </script>
</body>
</html>
