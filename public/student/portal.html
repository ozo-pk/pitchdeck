<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PitchDeck - Student Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-gray-100 font-sans min-h-screen">
  
  <header class="bg-gray-900/80 backdrop-blur-md border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-tr from-green-500 to-emerald-600 flex items-center justify-center font-bold shadow-lg shadow-green-500/30 text-xl">S</div>
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">Student <span class="text-green-400">Portal</span></h1>
      </div>
      <button onclick="logout()" class="bg-gray-700 hover:bg-gray-600 text-white font-medium py-2 px-5 rounded-lg transition-all border border-gray-600">Logout</button>
    </div>
  </header>

  <main class="max-w-4xl mx-auto p-6 mt-8 space-y-10">
    <!-- Team Registration -->
    <div class="bg-gray-800/60 backdrop-blur-md border border-gray-700/50 rounded-xl p-8 shadow-2xl relative overflow-hidden">
      <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
      <h2 class="text-2xl font-extrabold mb-6 text-white tracking-tight">Register a New Team</h2>
      <form id="register-form" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold mb-2 text-gray-300 uppercase tracking-wider">Select Hackathon</label>
          <select id="reg-hackathon-id" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 appearance-none cursor-pointer">
            <option value="">Loading open events...</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold mb-2 text-gray-300 uppercase tracking-wider">Team Name</label>
          <input type="text" id="reg-team-name" required placeholder="e.g. Innovators" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-bold py-3 rounded-lg shadow-lg hover:shadow-blue-500/50 transition-all transform hover:-translate-y-0.5">Register Team</button>
        <div id="reg-msg" class="text-sm mt-4 text-center font-bold"></div>
      </form>
    </div>

    <!-- Submit Project -->
    <div class="bg-gray-800/60 backdrop-blur-md border border-gray-700/50 rounded-xl p-8 shadow-2xl relative overflow-hidden">
      <div class="absolute top-0 left-0 w-1 h-full bg-green-500"></div>
      <h2 class="text-2xl font-extrabold mb-6 text-white tracking-tight">Submit Project</h2>
      <form id="submit-form" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold mb-2 text-gray-300 uppercase tracking-wider">Select Your Team</label>
          <select id="sub-team-select" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-green-500 appearance-none cursor-pointer">
            <option value="">Loading your teams...</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold mb-2 text-gray-300 uppercase tracking-wider">Project Title</label>
          <input type="text" id="sub-title" required placeholder="Name of your project" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-green-500">
        </div>
        <div>
          <label class="block text-sm font-semibold mb-2 text-gray-300 uppercase tracking-wider">Description</label>
          <textarea id="sub-desc" required rows="3" placeholder="What does it do?" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-green-500"></textarea>
        </div>
        <div class="flex gap-4">
          <div class="flex-1">
            <label class="block text-sm font-semibold mb-2 text-gray-300 uppercase tracking-wider">GitHub URL</label>
            <input type="url" id="sub-github" placeholder="https://github.com/..." class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-green-500">
          </div>
          <div class="flex-1">
            <label class="block text-sm font-semibold mb-2 text-gray-300 uppercase tracking-wider">Live Demo URL</label>
            <input type="url" id="sub-demo" placeholder="https://..." class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-green-500">
          </div>
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-green-600 to-emerald-700 hover:from-green-500 hover:to-emerald-600 text-white font-bold py-3 rounded-lg shadow-lg hover:shadow-green-500/50 transition-all transform hover:-translate-y-0.5">Submit Project</button>
        <div id="sub-msg" class="text-sm mt-4 text-center font-bold"></div>
      </form>
    </div>
  </main>

  <script>
    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/login.html';
    }

    async function loadDropdowns() {
      try {
        // Load hackathons for registration
        const hRes = await fetch('/api/hackathons');
        const hackathons = await hRes.json();
        const hSelect = document.getElementById('reg-hackathon-id');
        const openHackathons = hackathons.filter(h => h.status === 'open');
        
        if(openHackathons.length === 0) {
          hSelect.innerHTML = '<option value="">No open hackathons available</option>';
          hSelect.disabled = true;
        } else {
          hSelect.innerHTML = openHackathons.map(h => 
            `<option value="${h.hackathon_id}">${h.title}</option>`
          ).join('');
          hSelect.disabled = false;
        }

        // Load user's teams for submission
        const tRes = await fetch('/api/teams/my-teams', { credentials: 'include' });
        const teams = await tRes.json();
        const tSelect = document.getElementById('sub-team-select');
        
        if(teams.length === 0) {
          tSelect.innerHTML = '<option value="">You are not in any teams yet</option>';
          tSelect.disabled = true;
        } else {
          tSelect.innerHTML = teams.map(t => 
            `<option value='{"team_id":${t.team_id},"hackathon_id":${t.hackathon_id}}'>${t.team_name} (${t.hackathon_title})</option>`
          ).join('');
          tSelect.disabled = false;
        }
      } catch (err) {
        console.error('Failed to load dropdowns', err);
      }
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const hackathonId = document.getElementById('reg-hackathon-id').value;
      const teamName = document.getElementById('reg-team-name').value;
      const msg = document.getElementById('reg-msg');
      
      if(!hackathonId) return msg.textContent = 'Please select a hackathon.';

      try {
        const res = await fetch('/api/teams/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ hackathon_id: hackathonId, team_name: teamName })
        });
        const data = await res.json();
        if (data.status === 'Success') {
          msg.textContent = `Successfully registered team!`;
          msg.className = "text-sm mt-4 text-center font-bold text-green-400";
          document.getElementById('reg-team-name').value = '';
          await loadDropdowns(); // Refresh the My Teams dropdown
        } else {
          msg.textContent = data.status || data.error;
          msg.className = "text-sm mt-4 text-center font-bold text-red-400";
        }
      } catch (err) {
        msg.textContent = 'Network error';
      }
    });

    document.getElementById('submit-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('sub-msg');
      const teamSelect = document.getElementById('sub-team-select').value;
      
      if(!teamSelect) return msg.textContent = 'Please select a team.';
      const { team_id, hackathon_id } = JSON.parse(teamSelect);
      
      const payload = {
        hackathon_id: hackathon_id,
        team_id: team_id,
        title: document.getElementById('sub-title').value,
        description: document.getElementById('sub-desc').value,
        github_url: document.getElementById('sub-github').value,
        demo_url: document.getElementById('sub-demo').value
      };

      try {
        const res = await fetch('/api/submissions/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.status === 'Success') {
          msg.textContent = `Project successfully submitted!`;
          msg.className = "text-sm mt-4 text-center font-bold text-green-400";
          document.getElementById('submit-form').reset();
          await loadDropdowns(); // Re-select
        } else {
          msg.textContent = data.status || data.error;
          msg.className = "text-sm mt-4 text-center font-bold text-red-400";
        }
      } catch (err) {
        msg.textContent = 'Network error';
      }
    });

    // Initialize
    loadDropdowns();
  </script>
</body>
</html>
