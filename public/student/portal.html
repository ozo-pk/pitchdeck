<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PitchDeck - Student Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans selection:bg-indigo-100 selection:text-indigo-900">
  
  <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-tr from-green-500 to-emerald-600 flex items-center justify-center font-bold text-white shadow-lg shadow-green-500/30 text-xl transform hover:rotate-6 transition-transform">S</div>
        <h1 class="text-2xl font-extrabold text-slate-800">Student <span class="text-emerald-600 font-light">Portal</span></h1>
      </div>
      <div class="flex items-center gap-4">
        <a href="/" target="_blank" class="text-sm font-bold text-slate-500 hover:text-indigo-600 transition-colors flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg> Leaderboard
        </a>
        <button onclick="logout()" class="bg-white hover:bg-slate-50 text-slate-700 font-bold py-2 px-5 rounded-lg transition-all border border-slate-200 shadow-sm hover:shadow">Logout</button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto p-6 mt-8 space-y-10">
    <!-- Team Registration -->
    <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm hover:shadow-xl transition-shadow duration-300 relative overflow-hidden animate-fade-in-up">
      <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
      <div class="flex items-center gap-3 mb-8">
        <div class="p-3 bg-blue-50 text-blue-600 rounded-lg">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-800">Register a New Team</h2>
      </div>
      <form id="register-form" class="space-y-5">
        <div>
          <label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-wider">Select Hackathon</label>
          <div class="relative">
            <select id="reg-hackathon-id" required class="w-full bg-slate-50 text-slate-900 border border-slate-200 rounded-xl px-4 py-3 focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 appearance-none cursor-pointer font-medium transition-all">
              <option value="">Loading open events...</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-wider">Team Name</label>
          <input type="text" id="reg-team-name" required placeholder="e.g. Innovators" class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl px-4 py-3 focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 font-medium transition-all">
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3.5 rounded-xl shadow-lg hover:shadow-blue-500/40 transition-all transform hover:-translate-y-0.5 active:scale-95">Register Team</button>
        <div id="reg-msg" class="text-sm mt-4 text-center font-bold"></div>
      </form>
    </div>

    <!-- Submit Project -->
    <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm hover:shadow-xl transition-shadow duration-300 relative overflow-hidden animate-fade-in-up" style="animation-delay: 0.1s;">
      <div class="absolute top-0 left-0 w-1 h-full bg-green-500"></div>
      <div class="flex items-center gap-3 mb-8">
        <div class="p-3 bg-emerald-50 text-emerald-600 rounded-lg">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-800">Submit Project</h2>
      </div>
      <form id="submit-form" class="space-y-5">
        <div>
          <label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-wider">Select Your Team</label>
          <div class="relative">
            <select id="sub-team-select" required class="w-full bg-slate-50 text-slate-900 border border-slate-200 rounded-xl px-4 py-3 focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 appearance-none cursor-pointer font-medium transition-all">
              <option value="">Loading your teams...</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-wider">Project Title</label>
          <input type="text" id="sub-title" required placeholder="Name of your project" class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl px-4 py-3 focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 font-medium transition-all">
        </div>
        <div>
          <label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-wider">Description</label>
          <textarea id="sub-desc" required rows="3" placeholder="What does it do?" class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl px-4 py-3 focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 font-medium transition-all resize-none"></textarea>
        </div>
        <div class="flex gap-4">
          <div class="flex-1">
            <label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-wider">GitHub URL</label>
            <input type="url" id="sub-github" placeholder="https://github.com/..." class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl px-4 py-3 focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 font-medium transition-all">
          </div>
          <div class="flex-1">
            <label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-wider">Live Demo URL</label>
            <input type="url" id="sub-demo" placeholder="https://..." class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl px-4 py-3 focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 font-medium transition-all">
          </div>
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-400 hover:to-green-500 text-white font-bold py-3.5 rounded-xl shadow-lg hover:shadow-emerald-500/40 transition-all transform hover:-translate-y-0.5 active:scale-95">Submit Project</button>
        <div id="sub-msg" class="text-sm mt-4 text-center font-bold"></div>
      </form>
    </div>

    <!-- My Registration History -->
    <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm hover:shadow-xl transition-shadow duration-300 relative overflow-hidden animate-fade-in-up" style="animation-delay: 0.2s;">
      <div class="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
      <div class="flex items-center gap-3 mb-8">
        <div class="p-3 bg-indigo-50 text-indigo-600 rounded-lg">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-800">My Registration History</h2>
      </div>
      <div class="overflow-x-auto rounded-xl border border-slate-200">
        <table class="min-w-full divide-y divide-slate-200">
          <thead class="bg-slate-50">
            <tr>
              <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Team Name</th>
              <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Hackathon</th>
              <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Status</th>
            </tr>
          </thead>
          <tbody id="history-body" class="bg-white divide-y divide-slate-100">
            <tr><td colspan="3" class="px-6 py-4 text-center text-sm font-medium text-slate-500">Loading history...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/login.html';
    }

    async function loadDropdowns() {
      try {
        // Load hackathons for registration
        const hRes = await fetch('/api/hackathons');
        const hackathons = await hRes.json();
        const hSelect = document.getElementById('reg-hackathon-id');
        const openHackathons = hackathons.filter(h => h.status === 'open');
        
        if(openHackathons.length === 0) {
          hSelect.innerHTML = '<option value="">No open hackathons available</option>';
          hSelect.disabled = true;
        } else {
          hSelect.innerHTML = openHackathons.map(h => 
            `<option value="${h.hackathon_id}">${h.title}</option>`
          ).join('');
          hSelect.disabled = false;
        }

        // Load user's teams for submission
        const tRes = await fetch('/api/teams/my-teams', { credentials: 'include' });
        const teams = await tRes.json();
        const tSelect = document.getElementById('sub-team-select');
        
        if(teams.length === 0) {
          tSelect.innerHTML = '<option value="">You are not in any teams yet</option>';
          tSelect.disabled = true;
        } else {
          tSelect.innerHTML = teams.map(t => 
            `<option value='{"team_id":${t.team_id},"hackathon_id":${t.hackathon_id}}'>${t.team_name} (${t.hackathon_title})</option>`
          ).join('');
          tSelect.disabled = false;
        }
      } catch (err) {
        console.error('Failed to load dropdowns', err);
      }
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const hackathonId = document.getElementById('reg-hackathon-id').value;
      const teamName = document.getElementById('reg-team-name').value;
      const msg = document.getElementById('reg-msg');
      
      if(!hackathonId) return msg.textContent = 'Please select a hackathon.';

      try {
        const res = await fetch('/api/teams/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ hackathon_id: hackathonId, team_name: teamName })
        });
        const data = await res.json();
        if (data.status === 'Success') {
          msg.textContent = `Successfully registered team!`;
          msg.className = "text-sm mt-4 text-center font-bold text-emerald-600 bg-emerald-50 py-2 rounded-lg border border-emerald-200";
          document.getElementById('reg-team-name').value = '';
          await loadDropdowns(); // Refresh the My Teams dropdown
          await loadHistory();
        } else {
          msg.textContent = data.status || data.error;
          msg.className = "text-sm mt-4 text-center font-bold text-rose-600 bg-rose-50 py-2 rounded-lg border border-rose-200";
        }
      } catch (err) {
        msg.textContent = 'Network error';
      }
    });

    document.getElementById('submit-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('sub-msg');
      const teamSelect = document.getElementById('sub-team-select').value;
      
      if(!teamSelect) return msg.textContent = 'Please select a team.';
      const { team_id, hackathon_id } = JSON.parse(teamSelect);
      
      const payload = {
        hackathon_id: hackathon_id,
        team_id: team_id,
        title: document.getElementById('sub-title').value,
        description: document.getElementById('sub-desc').value,
        github_url: document.getElementById('sub-github').value,
        demo_url: document.getElementById('sub-demo').value
      };

      try {
        const res = await fetch('/api/submissions/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.status === 'Success') {
          msg.textContent = `Project successfully submitted!`;
          msg.className = "text-sm mt-4 text-center font-bold text-emerald-600 bg-emerald-50 py-2 rounded-lg border border-emerald-200";
          document.getElementById('submit-form').reset();
          await loadDropdowns(); // Re-select
        } else {
          msg.textContent = data.status || data.error;
          msg.className = "text-sm mt-4 text-center font-bold text-rose-600 bg-rose-50 py-2 rounded-lg border border-rose-200";
        }
      } catch (err) {
        msg.textContent = 'Network error';
      }
    });

    async function loadHistory() {
      try {
        const res = await fetch('/api/student/history', { credentials: 'include' });
        const history = await res.json();
        const tbody = document.getElementById('history-body');
        
        if (history.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-4 text-center text-sm font-medium text-slate-500">No registration history found.</td></tr>';
          return;
        }

        tbody.innerHTML = history.map(row => {
          let badgeClass = row.status === 'closed' ? 'bg-rose-100 text-rose-700 border-rose-200' : 'bg-emerald-100 text-emerald-700 border-emerald-200';
          let statusText = row.status === 'closed' ? 'Inactive' : 'Active';
          return `
            <tr class="hover:bg-slate-50 transition duration-150">
              <td class="px-6 py-5 font-extrabold text-slate-800 text-lg">${row.team_name}</td>
              <td class="px-6 py-5 font-medium text-slate-500">${row.hackathon_title}</td>
              <td class="px-6 py-5">
                <span class="px-3 py-1 inline-flex text-xs font-bold uppercase rounded-full border ${badgeClass}">
                  ${statusText}
                </span>
              </td>
            </tr>
          `;
        }).join('');
      } catch (err) {
        console.error('Failed to load history', err);
      }
    }

    // Initialize
    loadDropdowns();
    loadHistory();
  </script>
</body>
</html>
