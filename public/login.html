<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitchDeck - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex items-center justify-center selection:bg-indigo-100 selection:text-indigo-900 relative overflow-hidden">
  
  <!-- Background Decoration -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
    <div class="absolute -top-[20%] -right-[10%] w-[50%] h-[50%] bg-indigo-500/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-[20%] -left-[10%] w-[50%] h-[50%] bg-rose-500/10 rounded-full blur-3xl"></div>
  </div>

  <div class="max-w-md w-full mx-4 bg-white border border-slate-200 rounded-2xl shadow-xl shadow-slate-200/50 p-8 relative overflow-hidden animate-fade-in-up">
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-rose-500"></div>
    
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-indigo-500 to-purple-600 text-white font-bold text-3xl shadow-lg shadow-indigo-500/30 transform hover:rotate-6 transition-transform mb-4">P</div>
      <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">Welcome to <span class="text-indigo-600">PitchDeck</span></h2>
      <p class="text-slate-500 mt-2 font-medium">Sign in to access your dashboard</p>
    </div>

    <form id="login-form" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-bold text-slate-700 mb-1.5 uppercase tracking-wider">Email Address</label>
        <input type="email" id="email" required class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-medium">
      </div>
      <div>
        <label for="password" class="block text-sm font-bold text-slate-700 mb-1.5 uppercase tracking-wider">Password</label>
        <input type="password" id="password" required class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-medium">
      </div>
      
      <div id="error-msg" class="text-rose-600 text-sm font-bold text-center bg-rose-50 py-2 rounded-lg border border-rose-100 hidden"></div>
      
      <button type="submit" class="w-full flex justify-center py-3.5 px-4 rounded-xl shadow-lg text-white font-bold bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 focus:outline-none hover:shadow-indigo-500/40 transition-all transform hover:-translate-y-0.5 active:scale-95">
        Sign In Securely
      </button>
    </form>
    
    <div class="mt-6 text-center">
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest bg-slate-50 inline-block px-4 py-1.5 rounded-full border border-slate-200 shadow-sm">Demo Passwords are 'password123'</p>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-msg');
      
      errorDiv.classList.add('hidden');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        
        if (res.ok) {
          // Redirect based on role
          if (data.role === 'admin') window.location.href = '/admin/dashboard.html';
          else if (data.role === 'judge') window.location.href = '/judge/panel.html';
          else window.location.href = '/student/portal.html';
        } else {
          errorDiv.textContent = data.error || 'Login failed';
          errorDiv.classList.remove('hidden');
        }
      } catch (err) {
        errorDiv.textContent = 'Network error. Try again.';
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
