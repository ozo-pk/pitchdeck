<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitchDeck - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            charcoal: "#090909",
            forest: "#4B5043",
            sage: "#9BC4BC",
            mint: "#D3FFE9",
            aqua: "#8DDBE0"
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F9FAFB; /* Fallback light background */
    }
    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
      opacity: 0;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-[#F9FAFB] text-charcoal min-h-screen antialiased flex items-center justify-center selection:bg-aqua selection:text-charcoal relative">
  
  <!-- Subtle decorative background gradient based on mint -->
  <div class="absolute inset-0 bg-gradient-to-br from-[#F9FAFB] to-mint/20 z-0"></div>

  <div class="relative z-10 max-w-sm w-full mx-4 bg-white border border-forest/10 rounded-xl shadow-sm p-8 fade-in">
    
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-charcoal text-white font-medium text-xl shadow-sm mb-5 border border-forest/20">
        P
      </div>
      <h2 class="text-2xl font-semibold text-charcoal tracking-tight">Log in to PitchDeck</h2>
      <p class="text-forest text-sm mt-2 font-normal">Sign in to access your dashboard</p>
    </div>

    <form id="login-form" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-forest mb-1.5">Email Address</label>
        <input type="email" id="email" required class="w-full bg-[#F9FAFB] text-charcoal rounded-lg py-2.5 px-4 border border-forest/20 focus:outline-none focus:border-transparent focus:ring-2 focus:ring-aqua transition-colors font-medium">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-forest mb-1.5">Password</label>
        <input type="password" id="password" required class="w-full bg-[#F9FAFB] text-charcoal rounded-lg py-2.5 px-4 border border-forest/20 focus:outline-none focus:border-transparent focus:ring-2 focus:ring-aqua transition-colors font-medium">
      </div>
      
      <div id="error-msg" class="text-red-500 text-sm font-medium text-center bg-red-50 py-2.5 rounded-lg border border-red-100 hidden"></div>
      
      <button type="submit" class="w-full flex justify-center py-2.5 px-4 rounded-lg bg-aqua text-charcoal text-sm font-medium hover:bg-[#7bc8cd] focus:outline-none focus:ring-2 focus:ring-aqua focus:ring-offset-2 transition-colors duration-200 mt-2 shadow-sm">
        Continue
      </button>
    </form>
    
    <div class="mt-8 text-center border-t border-forest/10 pt-6">
      <p class="text-xs text-forest font-normal">Demo Password: <span class="font-medium text-charcoal">password123</span></p>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-msg');
      
      errorDiv.classList.add('hidden');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        
        if (res.ok) {
          if (data.role === 'admin') window.location.href = '/admin/dashboard.html';
          else if (data.role === 'judge') window.location.href = '/judge/panel.html';
          else window.location.href = '/student/portal.html';
        } else {
          errorDiv.textContent = data.error || 'Login failed';
          errorDiv.classList.remove('hidden');
        }
      } catch (err) {
        errorDiv.textContent = 'Network error. Try again.';
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
